<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강의·프로그램 신청 — 교육성장네트워크 꿈들</title>
  <meta name="description" content="하날오름어린이풍물단, 감수성 훈련, 꿈꾸는 교실 등 꿈들의 프로그램을 신청하세요." />
  <link rel="icon" type="image/png" href="favicon.png?v=20260702d" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="교육성장네트워크 꿈들" />
  <meta property="og:title" content="강의·프로그램 신청 — 교육성장네트워크 꿈들" />
  <meta property="og:description" content="꿈들의 프로그램 참여를 신청하세요." />
  <meta property="og:image" content="https://dream0grow.github.io/kkumddel/assets/img/brand/logo-full.png" />
  <meta property="og:url" content="https://dream0grow.github.io/kkumddel/apply.html" />
  <meta name="twitter:card" content="summary" />
  <link rel="stylesheet" href="assets/style.css?v=20260702d" />
</head>
<body>
  <div id="site-header"></div>

  <div class="page-head">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">홈</a> · 참여하기 · 강의·프로그램 신청</div>
      <h1>강의·프로그램 신청</h1>
      <p>감수성 훈련, 꿈꾸는 교실, 하날오름어린이풍물단 등 참여를 신청하실 수 있습니다.</p>
    </div>
  </div>

  <section class="section">
    <div class="container" style="max-width:660px">
      <form class="apply-form card" id="apply-form">
        <div class="fld">
          <label for="af-program">신청 프로그램 <span class="req">*</span></label>
          <select id="af-program" required>
            <option value="">선택해 주세요</option>
            <option>하날오름어린이풍물단</option>
            <option>감수성 훈련</option>
            <option>꿈꾸는 교실</option>
            <option>푸른꿈 작은 공부방</option>
            <option>기타(문의)</option>
          </select>
        </div>
        <div class="fld">
          <label for="af-name">이름 <span class="req">*</span></label>
          <input id="af-name" type="text" required placeholder="신청자 이름" />
        </div>
        <div class="fld">
          <label for="af-phone">연락처 <span class="req">*</span></label>
          <input id="af-phone" type="tel" required placeholder="010-0000-0000" />
        </div>
        <div class="fld">
          <label for="af-msg">신청 내용 · 문의</label>
          <textarea id="af-msg" rows="4" placeholder="학교·학년, 참여 인원, 문의 사항 등을 적어주세요."></textarea>
        </div>
        <button class="btn btn--primary btn--lg" type="submit">신청서 보내기</button>
        <p class="note" id="apply-note" style="margin-top:12px">
          제출 시 신청 내용이 담당자에게 전달됩니다. 문의: <a href="tel:010-2344-4373">010-2344-4373</a>
        </p>
      </form>
    </div>
  </section>

  <!-- 신청 현황 (로그인 회원만) -->
  <section class="section section--soft">
    <div class="container">
      <h2>신청 현황</h2>
      <p class="lead" style="margin-bottom:14px">지금까지 접수된 신청 내역입니다. <strong>로그인한 회원</strong>만 볼 수 있습니다.</p>
      <div id="apps-guard" class="card" style="text-align:center">
        <p>신청 현황은 <strong>로그인 후</strong> 확인할 수 있습니다.</p>
        <p style="margin-top:12px"><a class="btn btn--primary" href="login.html">로그인 / 회원가입</a></p>
      </div>
      <div id="apps-view" style="display:none">
        <div id="apps-summary" class="grid grid--4" style="margin-bottom:18px"></div>
        <div style="overflow-x:auto">
          <table class="admin-table" id="apps-table">
            <thead><tr><th>프로그램</th><th>이름</th><th class="col-phone">연락처</th><th>신청일</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <p class="note" id="apps-note" style="margin-top:10px"></p>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="assets/config.js?v=20260702d"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/auth.js?v=20260702d"></script>
  <script src="assets/apply.js?v=20260702d"></script>
  <script>
    (function () {
      function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
      async function loadApps() {
        var M = window.KKUMDLE_MEMBER, DB = window.KKUMDLE_DB;
        var guard = document.getElementById("apps-guard"), view = document.getElementById("apps-view");
        if (!M || !M.ready) { guard.querySelector("p").textContent = "신청 현황 기능은 준비 중입니다."; return; }
        await M.refresh();
        if (!M.isLoggedIn()) return;               // 비로그인: guard 그대로(차단)
        guard.style.display = "none"; view.style.display = "";
        var rows = [];
        try { rows = await DB.listApplications(); } catch (e) {
          document.getElementById("apps-note").textContent = "신청 내역을 불러오지 못했습니다.";
          return;
        }
        // 프로그램별 건수 요약
        var byProg = {};
        rows.forEach(function (r) { byProg[r.program||"기타"] = (byProg[r.program||"기타"]||0) + 1; });
        document.getElementById("apps-summary").innerHTML = Object.keys(byProg).map(function (k) {
          return '<div class="stat"><div class="num">' + byProg[k] + '<span style="font-size:1rem">건</span></div><div class="label">' + esc(k) + '</div></div>';
        }).join("") || '<div class="stat"><div class="num">0<span style="font-size:1rem">건</span></div><div class="label">신청 없음</div></div>';
        // 목록 (연락처는 관리자만 표시)
        var isAdmin = M.isAdmin();
        if (!isAdmin) document.querySelectorAll(".col-phone").forEach(function(el){ el.style.display="none"; });
        var tb = document.querySelector("#apps-table tbody");
        tb.innerHTML = rows.length ? rows.map(function (r) {
          var d = (r.created_at||"").slice(0,10).replace(/-/g,".");
          return "<tr><td>" + esc(r.program) + "</td><td>" + esc(r.name) + "</td>" +
                 (isAdmin ? "<td>" + esc(r.phone) + "</td>" : "") +
                 "<td>" + d + "</td></tr>";
        }).join("") : '<tr><td colspan="4" style="text-align:center;color:var(--ink-soft)">아직 신청 내역이 없습니다.</td></tr>';
        document.getElementById("apps-note").innerHTML = "총 <strong>" + rows.length + "건</strong> 신청" +
          (isAdmin ? "" : " · 연락처 등 개인정보는 관리자만 볼 수 있습니다.");
      }
      window.addEventListener("load", function(){ setTimeout(loadApps, 400); });
    })();
  </script>
  <script src="assets/site.js?v=20260702d"></script>
</body>
</html>
