<body>
  <div id="site-header"></div>

  <div class="page-head">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">홈</a> · 소식·보도자료</div>
      <h1>차곡차곡 쌓인 기록들</h1>
      <p>기부금 사용 결과부터 총회 보고, 신문에 난 이야기까지 — 스무 해의 기록이 그대로 있습니다.</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="filterbar" id="filterbar">
        <button class="chip active" data-cat="전체">전체</button>
        <button class="chip" data-cat="소식">소식</button>
        <button class="chip" data-cat="보도자료">보도자료</button>
      </div>
      <ul class="posts" id="all-posts"></ul>

      <p class="note" style="margin-top:24px">목록의 글을 누르면 본문이 열립니다.
        단원 모집·강의 같은 프로젝트 글은 <a href="projects.html">사업·프로젝트</a> 페이지에 있습니다.</p>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="assets/posts.js?v=20260702e"></script>
  <script>
    function show(cat) {
      if (cat === "전체") renderPosts("all-posts", { exclude: "프로젝트" });
      else renderPosts("all-posts", { category: cat });
    }
    show("전체");
    document.getElementById("filterbar").addEventListener("click", function (e) {
      var btn = e.target.closest(".chip");
      if (!btn) return;
      document.querySelectorAll("#filterbar .chip").forEach(function (c) { c.classList.remove("active"); });
      btn.classList.add("active");
      show(btn.dataset.cat);
    });
  </script>
  <script src="assets/config.js?v=20260702e"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/auth.js?v=20260702e"></script>
  <script src="assets/site.js?v=20260702e"></script>
</body>
</html>
