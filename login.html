<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 · 회원가입 — 교육성장네트워크 꿈들</title>
  <meta name="description" content="교육성장네트워크 꿈들 회원 로그인 및 회원가입" />
  <link rel="icon" type="image/png" href="favicon.png?v=20260702a" />
  <link rel="stylesheet" href="assets/style.css?v=20260702a" />
</head>
<body>
  <div id="site-header"></div>

  <div class="page-head">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">홈</a> · 로그인</div>
      <h1>로그인 · 회원가입</h1>
      <p>회원가입 후 프로젝트 게시판에 글을 남길 수 있습니다.</p>
    </div>
  </div>

  <section class="section">
    <div class="container" style="max-width:760px">
      <p class="note" id="not-ready" style="display:none">
        ⚠️ 회원 기능이 아직 연결되지 않았습니다. 관리자님은 <code>assets/config.js</code>에
        Supabase 정보를 입력해 주세요. (안내: <code>SUPABASE_SETUP.md</code>)
      </p>
      <div class="grid grid--2" id="auth-box">
        <form class="apply-form card" id="login-form">
          <h3 style="margin:0 0 14px">로그인</h3>
          <div class="fld"><label for="li-email">이메일</label><input id="li-email" type="email" required placeholder="you@example.com" /></div>
          <div class="fld"><label for="li-pw">비밀번호</label><input id="li-pw" type="password" required placeholder="비밀번호" /></div>
          <button class="btn btn--primary btn--lg" type="submit">로그인</button>
          <p class="note" id="login-msg" style="margin-top:10px"></p>
        </form>
        <form class="apply-form card" id="signup-form">
          <h3 style="margin:0 0 14px">회원가입</h3>
          <div class="fld"><label for="su-name">이름 <span class="req">*</span></label><input id="su-name" type="text" required placeholder="이름" /></div>
          <div class="fld"><label for="su-phone">연락처</label><input id="su-phone" type="tel" placeholder="010-0000-0000" /></div>
          <div class="fld"><label for="su-email">이메일 <span class="req">*</span></label><input id="su-email" type="email" required placeholder="you@example.com" /></div>
          <div class="fld"><label for="su-pw">비밀번호 <span class="req">*</span></label><input id="su-pw" type="password" required minlength="6" placeholder="6자 이상" /></div>
          <button class="btn btn--ghost btn--lg" type="submit">회원가입</button>
          <p class="note" id="signup-msg" style="margin-top:10px"></p>
        </form>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="assets/config.js?v=20260702a"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/auth.js?v=20260702a"></script>
  <script>
    (function () {
      if (!window.KKUMDLE_READY) {
        document.getElementById("not-ready").style.display = "";
        document.getElementById("auth-box").style.opacity = ".5";
      }
      var M = window.KKUMDLE_MEMBER;
      document.getElementById("login-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        var msg = document.getElementById("login-msg"); msg.textContent = "로그인 중…";
        try {
          await M.signIn(document.getElementById("li-email").value.trim(), document.getElementById("li-pw").value);
          location.href = "projects.html";
        } catch (err) { msg.style.color = "#c0392b"; msg.textContent = "로그인 실패: " + (err.message || "이메일/비밀번호를 확인하세요."); }
      });
      document.getElementById("signup-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        var msg = document.getElementById("signup-msg"); msg.style.color = ""; msg.textContent = "가입 중…";
        try {
          await M.signUp(
            document.getElementById("su-email").value.trim(),
            document.getElementById("su-pw").value,
            document.getElementById("su-name").value.trim(),
            document.getElementById("su-phone").value.trim()
          );
          msg.textContent = "✅ 가입 완료! 이메일 인증이 필요할 수 있습니다. 로그인해 주세요.";
        } catch (err) { msg.style.color = "#c0392b"; msg.textContent = "가입 실패: " + (err.message || "다시 시도해 주세요."); }
      });
    })();
  </script>
  <script src="assets/site.js?v=20260702a"></script>
</body>
</html>
